openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Chemidot B2B Chemical Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: products
    description: Products/chemicals
  - name: categories
    description: Product categories
  - name: suppliers
    description: Supplier companies
  - name: rfqs
    description: Request for Quotation
  - name: quotations
    description: Quotation responses
  - name: collective-orders
    description: Collective ordering system
  - name: orders
    description: Orders
  - name: messages
    description: Messaging
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard data
  - name: admin
    description: Admin operations
  - name: reviews
    description: Product reviews
  - name: projects
    description: Projects and case studies

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: supplierId
          in: query
          schema:
            type: integer
        - name: country
          in: query
          schema:
            type: string
        - name: minMoq
          in: query
          schema:
            type: number
        - name: maxMoq
          in: query
          schema:
            type: number
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: certifications
          in: query
          schema:
            type: string
        - name: collectiveEligible
          in: query
          schema:
            type: boolean
        - name: verifiedSupplier
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, moq_asc, rating]
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsPage"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (supplier only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: Get featured products for homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/trending:
    get:
      operationId: listTrendingSearches
      tags: [products]
      summary: Get trending searches and popular products
      responses:
        "200":
          description: Trending data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingData"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      summary: Get related products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List suppliers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: verified
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Suppliers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppliersPage"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProfile"

  /suppliers/featured:
    get:
      operationId: listFeaturedSuppliers
      tags: [suppliers]
      summary: Get featured/trusted suppliers
      responses:
        "200":
          description: Featured suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"

  /suppliers/{id}/brands:
    get:
      operationId: listSupplierBrands
      tags: [suppliers]
      summary: List brands for a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brands list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierBrand"

  /suppliers/{id}/documents:
    get:
      operationId: listSupplierDocuments
      tags: [suppliers]
      summary: List documents for a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierDocument"

  /suppliers/{id}/experts:
    get:
      operationId: listSupplierExperts
      tags: [suppliers]
      summary: List experts for a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Experts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierExpert"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects and case studies
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
        - name: industry
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project/case study by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /rfqs:
    get:
      operationId: listRfqs
      tags: [rfqs]
      summary: List RFQs (buyer sees own, supplier sees received)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, closed, awarded]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: RFQs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqsPage"
    post:
      operationId: createRfq
      tags: [rfqs]
      summary: Create an RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRfqBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"

  /rfqs/{id}:
    get:
      operationId: getRfq
      tags: [rfqs]
      summary: Get RFQ detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFQ detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfqDetail"
    put:
      operationId: updateRfq
      tags: [rfqs]
      summary: Update an RFQ (buyer only, must be owner)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRfqBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"
    delete:
      operationId: deleteRfq
      tags: [rfqs]
      summary: Delete an RFQ (buyer only, must be owner)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rfqs/{id}/quotations:
    get:
      operationId: listRfqQuotations
      tags: [quotations]
      summary: List quotations for an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quotation"
    post:
      operationId: submitQuotation
      tags: [quotations]
      summary: Submit a quotation for an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuotationBody"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /rfqs/{id}/quotations/{qid}/accept:
    post:
      operationId: acceptQuotation
      tags: [quotations]
      summary: Accept a quotation (buyer only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: qid
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /rfqs/{id}/quotations/{qid}/reject:
    post:
      operationId: rejectQuotation
      tags: [quotations]
      summary: Reject a quotation (buyer only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: qid
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /rfqs/{id}/quotations/{qid}/negotiations:
    get:
      operationId: listNegotiationMessages
      tags: [quotations]
      summary: List negotiation messages for a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: qid
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Negotiation messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NegotiationMessage"
    post:
      operationId: sendNegotiationMessage
      tags: [quotations]
      summary: Send a negotiation message or counter-offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: qid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNegotiationMessageBody"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NegotiationMessage"

  /collective-orders:
    get:
      operationId: listCollectiveOrders
      tags: [collective-orders]
      summary: List active collective orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closing_soon, closed, fulfilled]
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: region
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Collective orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiveOrdersPage"
    post:
      operationId: createCollectiveOrder
      tags: [collective-orders]
      summary: Create a collective order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectiveOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiveOrder"

  /collective-orders/{id}:
    get:
      operationId: getCollectiveOrder
      tags: [collective-orders]
      summary: Get collective order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collective order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiveOrderDetail"

  /collective-orders/{id}/join:
    post:
      operationId: joinCollectiveOrder
      tags: [collective-orders]
      summary: Join a collective order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCollectiveOrderBody"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiveOrderParticipant"

  /collective-orders/{id}/leave:
    post:
      operationId: leaveCollectiveOrder
      tags: [collective-orders]
      summary: Leave/withdraw from a collective order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, processing, shipped, delivered, completed, cancelled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersPage"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (supplier progresses, buyer confirms delivery)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /messages:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List conversations
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/{conversationId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/buyer-stats:
    get:
      operationId: getBuyerStats
      tags: [dashboard]
      summary: Get buyer dashboard statistics
      responses:
        "200":
          description: Buyer stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyerStats"

  /dashboard/supplier-stats:
    get:
      operationId: getSupplierStats
      tags: [dashboard]
      summary: Get supplier dashboard statistics
      responses:
        "200":
          description: Supplier stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierStats"

  /dashboard/marketplace-stats:
    get:
      operationId: getMarketplaceStats
      tags: [dashboard]
      summary: Get public marketplace statistics (homepage)
      responses:
        "200":
          description: Marketplace stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"

  /products/{id}/reviews:
    get:
      operationId: listProductReviews
      tags: [reviews]
      summary: List reviews for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createProductReview
      tags: [reviews]
      summary: Create a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [buyer, supplier, admin]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, pending_verification]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPage"

  /admin/users/{id}/status:
    put:
      operationId: adminUpdateUserStatus
      tags: [admin]
      summary: Update user status (ban/activate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/suppliers/{id}/verify:
    put:
      operationId: adminVerifySupplier
      tags: [admin]
      summary: Verify/approve a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide admin statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

