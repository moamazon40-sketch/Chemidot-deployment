services:
  - type: web
    name: chemidot
    runtime: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/db push && pnpm --filter @workspace/chemidot build && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: chemidot-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://chemidot.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: RESET_PASSWORD
        generateValue: true
      - key: USER_EMAILS
        value: mohamed@example.com

databases:
  - name: chemidot-db
    plan: starter
